seed: 42

data:
  dataset_name: tiny_shakespeare
  data_path: data/raw/input.txt
  seq_len: 128
  train_split: 0.9

model:
  vocab_size: 65
  d_model: 128
  n_heads: 4
  n_layers: 4
  d_ff: 256
  dropout: 0.1
  max_seq_len: 128

train:
  batch_size: 32
  epochs: 3
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  log_every: 50
  save_dir: checkpoints